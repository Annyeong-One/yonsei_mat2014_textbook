          - lambda Expressions: ch01/functions/lambda.md
      - 1.8 Memory Model:
          - Stack vs Heap: ch01/memory/stack_vs_heap.md
          - Object Id and References: ch01/memory/object_identity.md
      - 1.9 Assignment:
          - Assignment (Python vs C): ch01/memory/assignment_python_vs_c.md
          - Mutable vs Immutable: ch01/memory/mutable_vs_immutable.md
          - list Assignment and Aliasing: ch01/memory/list_assignment.md
          - Ref Counting & GC: ch01/memory/garbage_collection.md
      - 1.10 Exceptions:
          - Exception Hierarchy: ch01/exceptions/hierarchy.md
