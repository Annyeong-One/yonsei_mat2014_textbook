site_name: Python
theme:
    name: material
    favicon: assets/favicon.ico

markdown_extensions:
    - admonition
    - pymdownx.details
    - attr_list
    - md_in_html
    - toc:
        permalink: true
    - pymdownx.superfences:
        custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:mermaid2.fence_mermaid_custom
    - pymdownx.arithmatex:
        generic: true

extra_javascript:
    - javascripts/mathjax.js
    - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
    - stylesheets/extra.css

exclude_docs: |
    *_score.md
    *_v[0-9]*.md
    *_review.md
    !ch15/definition_and_setup/markov_processes_review.md

