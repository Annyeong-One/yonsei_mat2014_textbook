          - set and Membership Semantics: ch01/composite_data_types/set.md

      - 1.6 Functions:
          - Function Definition and Call Stack: ch01/functions/functions.md
          - Parameters and Return Values: ch01/functions/parameters.md
          - Recursion and Stack Overflow: ch01/functions/recursion.md
          - lambda Expressions: ch01/functions/lambda.md

      - 1.7 Memory Model and Assignment:
          - Stack vs Heap (Conceptual Model): ch01/memory/stack_vs_heap.md
          - Object Identity and References: ch01/memory/object_identity.md
          - Assignment Semantics (Python vs C): ch01/memory/assignment_python_vs_c.md
          - Mutable vs Immutable Objects: ch01/memory/mutable_vs_immutable.md
          - list Assignment and Aliasing: ch01/memory/list_assignment.md
          - Reference Counting and Garbage Collection: ch01/memory/garbage_collection.md

      - 1.8 Exceptions:
          - Exception Hierarchy: ch01/exceptions/hierarchy.md
          - Common Runtime Errors: ch01/exceptions/common_errors.md
          - try / except / finally: ch01/exceptions/handling.md
          - Raising Exceptions: ch01/exceptions/raising.md

      - 1.9 File I/O:
          - Opening and Reading Files: ch01/io/file_reading.md
          - Writing Files: ch01/io/file_writing.md
