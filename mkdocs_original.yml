          - id(), type(), isinstance(): ch01/advanced_builtins/introspection.md

      - 1.11 Modules and Imports:
          - import Mechanics: ch01/modules/imports.md
          - sys.path and Module Search Order: ch01/modules/module_search.md
          - __name__ == "__main__": ch01/modules/main_guard.md
          - Scripts vs Modules: ch01/modules/scripts_vs_modules.md

      - 1.12 Namespaces and Name Resolution:
          - LEGB Rule: ch01/namespaces/legb.md
          - Global vs Local Variables: ch01/namespaces/scope.md

      - 1.13 Classes and Objects:
          - Class Definition and Instances: ch01/oop/classes.md
