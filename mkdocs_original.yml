site_name: Python
theme:
  name: material

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

nav:
  - Home: index.md

  - Chapter 1 Python:
      - 1.1 Getting Started:
          - Installing Python (brew, conda, pip): ch01/setup/installing_python.md
          - Python Interpreter and REPL: ch01/setup/python_interpreter.md

      - 1.2 Basic Syntax and Control Flow:
          - Variables and Naming Rules: ch01/basics/variables.md
          - Expressions and Statements: ch01/basics/expressions.md
          - if / for / while: ch01/basics/control_flow.md
          - Indentation and Blocks: ch01/basics/indentation.md

      - 1.3 Essential Built-in Functions:
          - print() and input(): ch01/builtins/print_input.md
          - len(), range(), enumerate(): ch01/builtins/len_range_enumerate.md

      - 1.4 Built-in Data Types:
          - int Python vs C (Memory & Semantics): ch01/types/int_python_vs_c.md
          - float IEEE 754 and Precision: ch01/types/float_behavior.md
          - bool and None: ch01/types/bool_none.md
          - str Python vs C Strings: ch01/types/str_python_vs_c.md
          - Type Conversions (int, float, str, bool): ch01/types/type_conversions.md

      - 1.5 Composite Data Types:
          - tuple and Immutability: ch01/composite_data_types/tuple.md
          - list and Dynamic Arrays: ch01/composite_data_types/list.md
