  - Chapter 4 Pandas:
      - 4.1 Core pandas Objects:
          - Series and DataFrame: ch04/core/series_dataframe.md
          - Indexing and Selection: ch04/core/indexing.md
      - 4.2 Data Wrangling:
          - GroupBy and Aggregation: ch04/wrangling/groupby.md
          - Merge and Join: ch04/wrangling/merge_join.md
      - 4.3 Time Series:
          - DatetimeIndex: ch04/timeseries/datetimeindex.md
          - Resampling and Rolling: ch04/timeseries/resampling.md

  - Chapter 5 PyTorch:
      - 5.1 Tensors and Autograd:
          - Tensor Basics: ch05/tensors/basics.md
          - Autograd Mechanics: ch05/autograd/autograd.md
      - 5.2 Neural Network Components:
          - Modules and Parameters: ch05/nn/modules.md
          - Loss Functions and Optimizers: ch05/nn/optimizers.md
      - 5.3 Training and Performance:
          - Training Loops: ch05/training/training_loops.md
