      - 1.15 Iteration Internals:
          - Iterables and Iterators: ch01/iteration/iterables.md
          - Generators and yield: ch01/iteration/generators.md

      - 1.16 Performance and Mental Models:
          - Time vs Space Trade-offs: ch01/performance/tradeoffs.md
          - Python Execution Model: ch01/performance/execution_model.md

  - Chapter 2 NumPy:
      - 2.1 NumPy ndarray Fundamentals:
          - Array Creation and dtypes: ch02/ndarray/creation.md
          - Shape, Strides, and Views: ch02/ndarray/shape_strides.md
      - 2.2 Vectorization and Broadcasting:
          - Broadcasting Rules: ch02/vectorization/broadcasting.md
